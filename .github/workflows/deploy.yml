name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub Secrets 를 config.js 에 주입
      # (config.js 는 .gitignore 등록 — 소스에 없고 배포 시 자동 생성)
      - name: Inject API keys into config.js
        run: |
          cat > config.js << EOF
          export const GEMINI_API_KEY     = '${{ secrets.GEMINI_API_KEY }}';
          export const NAVER_CLIENT_ID     = '${{ secrets.NAVER_CLIENT_ID }}';
          export const NAVER_CLIENT_SECRET = '${{ secrets.NAVER_CLIENT_SECRET }}';
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # 저장소 루트 전체를 배포

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
